<!DOCTYPE html>
<html>
<head>
  <title>Network Watchdog</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
      margin-top: 30px;
    }
    h1 { color: #bb86fc; }
    table {
      margin-left: auto;
      margin-right: auto;
      border-collapse: collapse;
      width: 80%;
      max-width: 800px;
      background-color: #1e1e1e;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td { padding: 15px; border-bottom: 1px solid #333; }
    th { background-color: #2c2c2c; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:hover { background-color: #2a2a2a; }
    .online { color: #00FF00; font-weight: bold; }
    .offline { color: #FF0000; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Enterprise Network Watchdog</h1>
  <table>
    <thead>
      <tr>
        <th>Device Name</th>
        <th>IP Address</th>
        <th>Status</th>
        <th>Latency</th>
      </tr>
    </thead>
    <tbody id="data-table">
      <tr><td colspan="4">Loading network data...</td></tr>
    </tbody>
  </table>

  <script>
    // This function calls the ESP32 API and builds the table in the browser
    function updateDashboard() {
      fetch('/api/data')
        .then(response => response.json())
        .then(data => {
          let rows = '';
          data.forEach(target => {
            let statusClass = target.latency !== -1 ? 'online' : 'offline';
            let statusText = target.latency !== -1 ? 'ONLINE' : 'OFFLINE';
            let pingText = target.latency !== -1 ? target.latency + ' ms' : 'Timeout';
            
            rows += `<tr>
                      <td>${target.name}</td>
                      <td>${target.ip}</td>
                      <td class="${statusClass}">${statusText}</td>
                      <td>${pingText}</td>
                     </tr>`;
          });
          document.getElementById('data-table').innerHTML = rows;
        })
        .catch(err => console.error("Connection lost:", err));
    }

    // Refresh the data every 2 seconds without reloading the page!
    setInterval(updateDashboard, 2000);
    updateDashboard(); // Run once immediately
  </script>
</body>
</html>
